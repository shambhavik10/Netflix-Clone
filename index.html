<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME PAGE -->

<section id="home" class="hero">

<header>
    <h1 class="logo">NETFLIX</h1>

    <a href="#login">
        <button class="signin-btn">Sign In</button>
    </a>
</header>

<div class="hero-content">

    <h1>Unlimited movies, TV shows and more.</h1>

    <h3>Watch anywhere. Cancel anytime.</h3>

    <a href="#login">
        <button class="start-btn">Get Started</button>
    </a>

</div>

</section>

<!-- LOGIN PAGE -->

<section id="login" class="login-section">

<div class="login-box">

    <h2>Sign In</h2>

    <input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button type="button" onclick="login()">Sign In</button>

    <a href="#browse">
        <button>Login</button>
    </a>

</div>

</section>

<!-- BROWSE PAGE -->

<section id="browse" class="browse">

<header class="browse-header">
    <h1 class="logo">NETFLIX</h1>
</header>

<div class="movies">

<h2>Trending Now</h2>

<div class="movie-row">

<div class="movie-card">Movie 1</div>
<div class="movie-card">Movie 2</div>
<div class="movie-card">Movie 3</div>
<div class="movie-card">Movie 4</div>

</div>

<h2>Popular on Netflix</h2>

<div class="movie-row">

<div class="movie-card">Movie 5</div>
<div class="movie-card">Movie 6</div>
<div class="movie-card">Movie 7</div>
<div class="movie-card">Movie 8</div>

</div>

</div>

</section>
<script src="script.js"></script>
</body>
</html>
